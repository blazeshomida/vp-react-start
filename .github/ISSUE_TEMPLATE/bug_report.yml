name: Bug Report
description: Report broken behavior, failing checks, or incorrect output.
title: "bug: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the problem in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe the intended behavior.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened?
      placeholder: Include the error, incorrect output, or failing command.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Smallest reliable steps to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See `...`
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands or checks already run.
      placeholder: |
        - [ ] `vpr ready`
        - [ ] `vpr check`
        - [ ] `vpr test`
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Extra context, suspected cause, links, or screenshots.
    validations:
      required: false
